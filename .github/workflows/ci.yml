name: 'ci'
run-name: 'ODK Web Forms CI'

on:
  workflow_dispatch:
  push:
  merge_group:
  pull_request:
    paths-ignore:
      - ".vscode/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"

# Automatically cancel older in-progress jobs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request_target' && github.head_ref || github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash

env:
  TZ: 'America/Phoenix'
  LOCALE_ID: 'en-US'

jobs:
  ci-conditions:
    name: 'CI conditions'
    runs-on: 'ubuntu-latest'
    outputs:
      IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
      IS_PR: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Capture CI conditions
        id: capture-ci-conditions
        run: exit 0

  install-and-build:
    needs: ci-conditions
    if: ${{ needs.ci-conditions.outputs.IS_PR != 'true' || needs.ci-conditions.outputs.IS_FORK == 'true' }}
    name: 'Install dependencies and build packages'
    runs-on: 'ubuntu-latest'

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.19.3', '22.12.0', '24.11.0']

    steps:
      - uses: 'actions/checkout@v5'

      - uses: 'volta-cli/action@v5'
        with:
          node-version: '${{ matrix.node-version }}'

      - uses: 'actions/cache@v5'
        id: cache-install
        with:
          path: |
            node_modules
            **/node_modules
          key: install-${{ matrix.node-version }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.github/workflows/ci.yml', 'examples/*/yarn.lock', 'packages/*/package.json', 'packages/*/yarn.lock') }}

      - uses: 'actions/cache@v5'
        id: cache-build
        with:
          path: |
            examples/*/dist
            packages/*/dist
            packages/web-forms/dist-demo
          key: build-${{ matrix.node-version }}-${{ github.sha }}

      - run: 'yarn install --immutable'
      - run: 'yarn build --force'

  lint:
    name: 'Lint (global)'
    needs: ['install-and-build']
    runs-on: 'ubuntu-latest'

    strategy:
      matrix:
        node-version: ['24.11.0']

    steps:
      - uses: 'actions/checkout@v5'

      - uses: 'volta-cli/action@v5'
        with:
          node-version: '${{ matrix.node-version }}'

      - uses: 'actions/cache@v5'
        id: cache-install
        with:
          path: |
            node_modules
            **/node_modules
          key: install-${{ matrix.node-version }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.github/workflows/ci.yml', 'examples/*/yarn.lock', 'packages/*/package.json', 'packages/*/yarn.lock') }}
          fail-on-cache-miss: true

      - uses: 'actions/cache@v5'
        id: cache-build
        with:
          path: |
            examples/*/dist
            packages/*/dist
            packages/web-forms/dist-demo
          key: build-${{ matrix.node-version }}-${{ github.sha }}
          fail-on-cache-miss: true

      - run: 'yarn lint'

      - run: 'yarn format:checkonly'

  odk-common:
    name: '@getodk/common'
    needs: ['install-and-build']
    runs-on: 'ubuntu-latest'

    strategy:
      fail-fast: false
      matrix:
        target: ['Node']
        node-version: ['20.19.3', '22.12.0', '24.11.0']
        include:
          - target: 'Web'
            node-version: '24.11.0'
            browser: chromium
          - target: 'Web'
            node-version: '24.11.0'
            browser: firefox
          - target: 'Web'
            node-version: '24.11.0'
            browser: webkit

    steps:
      - uses: 'actions/checkout@v5'

      - uses: 'volta-cli/action@v5'
        with:
          node-version: '${{ matrix.node-version }}'

      - uses: 'actions/cache@v5'
        id: cache-install
        with:
          path: |
            node_modules
            **/node_modules
          key: install-${{ matrix.node-version }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.github/workflows/ci.yml', 'examples/*/yarn.lock', 'packages/*/package.json', 'packages/*/yarn.lock') }}
          fail-on-cache-miss: true

      - uses: 'actions/cache@v5'
        id: cache-build
        with:
          path: |
            examples/*/dist
            packages/*/dist
            packages/web-forms/dist-demo
          key: build-${{ matrix.node-version }}-${{ github.sha }}
          fail-on-cache-miss: true

      - if: ${{ matrix.target == 'Node' }}
        run: 'yarn workspace @getodk/common test:types'

      - if: ${{ matrix.target == 'Node' }}
        run: 'yarn workspace @getodk/common test-node:jsdom'

      - if: ${{ matrix.target == 'Web' }}
        run: 'yarn playwright install ${{ matrix.browser }} --with-deps'

      - if: ${{ matrix.target == 'Web' }}
        run: 'yarn workspace @getodk/common test-browser:${{ matrix.browser }}'

  xforms-engine:
    name: '@getodk/xforms-engine'
    needs: ['install-and-build']
    runs-on: 'ubuntu-latest'

    strategy:
      fail-fast: false
      matrix:
        target: ['Node']
        node-version: ['20.19.3', '22.12.0', '24.11.0']
        include:
          - target: 'Web'
            node-version: '24.11.0'
            browser: chromium
          - target: 'Web'
            node-version: '24.11.0'
            browser: firefox
          - target: 'Web'
            node-version: '24.11.0'
            browser: webkit

    steps:
      - uses: 'actions/checkout@v5'

      - uses: 'volta-cli/action@v5'
        with:
          node-version: '${{ matrix.node-version }}'

      - uses: 'actions/cache@v5'
        id: cache-install
        with:
          path: |
            node_modules
            **/node_modules
          key: install-${{ matrix.node-version }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.github/workflows/ci.yml', 'examples/*/yarn.lock', 'packages/*/package.json', 'packages/*/yarn.lock') }}
          fail-on-cache-miss: true

      - uses: 'actions/cache@v5'
        id: cache-build
        with:
          path: |
            examples/*/dist
            packages/*/dist
            packages/web-forms/dist-demo
          key: build-${{ matrix.node-version }}-${{ github.sha }}
          fail-on-cache-miss: true

      - if: ${{ matrix.target == 'Node' }}
        run: 'yarn workspace @getodk/xforms-engine test:types'

      - if: ${{ matrix.target == 'Node' }}
        run: 'yarn workspace @getodk/xforms-engine test-node:jsdom'

      - if: ${{ matrix.target == 'Web' }}
        run: 'yarn playwright install ${{ matrix.browser }} --with-deps'

      - if: ${{ matrix.target == 'Web' }}
        run: 'yarn workspace @getodk/xforms-engine test-browser:${{ matrix.browser }}'

  scenario:
    name: '@getodk/scenario'
    needs: ['install-and-build']
    runs-on: 'ubuntu-latest'

    strategy:
      fail-fast: false
      matrix:
        target: ['Node']
        node-version: ['20.19.3', '22.12.0', '24.11.0']
        include:
          - target: 'Web'
            node-version: '24.11.0'
            browser: chromium
          - target: 'Web'
            node-version: '24.11.0'
            browser: firefox
          - target: 'Web'
            node-version: '24.11.0'
            browser: webkit

    steps:
      - uses: 'actions/checkout@v5'

      - uses: 'volta-cli/action@v5'
        with:
          node-version: '${{ matrix.node-version }}'

      - uses: 'actions/cache@v5'
        id: cache-install
        with:
          path: |
            node_modules
            **/node_modules
          key: install-${{ matrix.node-version }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.github/workflows/ci.yml', 'examples/*/yarn.lock', 'packages/*/package.json', 'packages/*/yarn.lock') }}
          fail-on-cache-miss: true

      - uses: 'actions/cache@v5'
        id: cache-build
        with:
          path: |
            examples/*/dist
            packages/*/dist
            packages/web-forms/dist-demo
          key: build-${{ matrix.node-version }}-${{ github.sha }}
          fail-on-cache-miss: true

      - if: ${{ matrix.target == 'Node' }}
        run: 'yarn workspace @getodk/scenario test:types'

      - if: ${{ matrix.target == 'Node' }}
        run: 'yarn workspace @getodk/scenario test-node:jsdom'

      - if: ${{ matrix.target == 'Web' }}
        run: 'yarn playwright install ${{ matrix.browser }} --with-deps'

      - if: ${{ matrix.target == 'Web' }}
        run: 'yarn workspace @getodk/scenario test-browser:${{ matrix.browser }}'

  xpath:
    name: '@getodk/xpath'
    needs: ['install-and-build']
    runs-on: 'ubuntu-latest'

    strategy:
      fail-fast: false
      matrix:
        target: ['Node']
        node-version: ['20.19.3', '22.12.0', '24.11.0']
        include:
          - target: 'Web'
            node-version: '24.11.0'
            browser: chromium
          - target: 'Web'
            node-version: '24.11.0'
            browser: firefox
          - target: 'Web'
            node-version: '24.11.0'
            browser: webkit

    steps:
      - uses: 'actions/checkout@v5'

      - uses: 'volta-cli/action@v5'
        with:
          node-version: '${{ matrix.node-version }}'

      - uses: 'actions/cache@v5'
        id: cache-install
        with:
          path: |
            node_modules
            **/node_modules
          key: install-${{ matrix.node-version }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.github/workflows/ci.yml', 'examples/*/yarn.lock', 'packages/*/package.json', 'packages/*/yarn.lock') }}
          fail-on-cache-miss: true

      - uses: 'actions/cache@v5'
        id: cache-build
        with:
          path: |
            examples/*/dist
            packages/*/dist
            packages/web-forms/dist-demo
          key: build-${{ matrix.node-version }}-${{ github.sha }}
          fail-on-cache-miss: true

      - if: ${{ matrix.target == 'Node' }}
        run: 'yarn workspace @getodk/xpath test:types'

      - if: ${{ matrix.target == 'Node' }}
        run: 'yarn workspace @getodk/xpath test-node:jsdom'

      - if: ${{ matrix.target == 'Web' }}
        run: 'yarn playwright install ${{ matrix.browser }} --with-deps'

      - if: ${{ matrix.target == 'Web' }}
        run: 'yarn workspace @getodk/xpath test-browser:${{ matrix.browser }}'

  web-forms:
    name: '@getodk/web-forms'
    needs: ['install-and-build']
    runs-on: 'ubuntu-latest'

    strategy:
      fail-fast: false
      matrix:
        target: ['Node']
        node-version: ['20.19.3', '22.12.0', '24.11.0']
        include:
          - target: 'Web'
            node-version: '24.11.0'
            browser: chromium
          - target: 'Web'
            node-version: '24.11.0'
            browser: firefox
          - target: 'Web'
            node-version: '24.11.0'
            browser: webkit

    steps:
      - uses: 'actions/checkout@v5'

      - uses: 'volta-cli/action@v5'
        with:
          node-version: '${{ matrix.node-version }}'

      - uses: 'actions/cache@v5'
        id: cache-install
        with:
          path: |
            node_modules
            **/node_modules
          key: install-${{ matrix.node-version }}-${{ hashFiles('yarn.lock', '.yarnrc.yml', '.github/workflows/ci.yml', 'examples/*/yarn.lock', 'packages/*/package.json', 'packages/*/yarn.lock') }}
          fail-on-cache-miss: true

      - uses: 'actions/cache@v5'
        id: cache-build
        with:
          path: |
            examples/*/dist
            packages/*/dist
            packages/web-forms/dist-demo
          key: build-${{ matrix.node-version }}-${{ github.sha }}
          fail-on-cache-miss: true

      - if: ${{ matrix.target == 'Node' }}
        run: 'yarn workspace @getodk/web-forms test:types'

      - if: ${{ matrix.target == 'Node' }}
        run: 'yarn workspace @getodk/web-forms test-node:jsdom'

      - if: ${{ matrix.target == 'Web' }}
        run: 'yarn playwright install ${{ matrix.browser }} --with-deps'

      # TODO: hopefully temporary! Attempt to mitigate flakiness in webkit by
      # running twice when first run fails. At least in local testing, this has
      # been near (if not at) 100% success.
      - if: ${{ matrix.target == 'Web' && matrix.browser == 'webkit' }}
        run: 'yarn workspace @getodk/web-forms test-browser:${{ matrix.browser }} || yarn workspace @getodk/web-forms test-browser:${{ matrix.browser }}'

      - if: ${{ matrix.target == 'Web' && matrix.browser != 'webkit' }}
        run: 'yarn workspace @getodk/web-forms test-browser:${{ matrix.browser }}'

      - if: ${{ matrix.node-version == '24.11.0' && matrix.target == 'Node' }}
        uses: actions/upload-artifact@v7
        with:
          name: dist-demo
          path: packages/web-forms/dist-demo

  e2e-tests:
    name: 'Run E2E Tests'
    needs: [ 'install-and-build' ]
    uses: ./.github/workflows/e2e-tests.yml
